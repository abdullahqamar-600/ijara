   Rich-input builders
   ============================================================= */
function buildRichInput(beatId){
  const b = BEATS[beatId];
  if (b.rich.kind === 'currency') return buildCurrency(beatId);
  if (b.rich.kind === 'address')  return buildAddress();
  if (b.rich.kind === 'consent')  return buildConsent();
  if (b.rich.kind === 'flip')     return buildFlipForm();
  if (b.rich.kind === 'commercial') return buildCommercial();
  return null;
}

function buildCurrency(beatId){
  const b = BEATS[beatId];
  const conf = b.rich;
  const host = el('div', { class:'rich-host' });
  const card = el('div', { class:'rich-card' });
  card.append(el('div', { class:'label' }, conf.currency === 'CAD' ? 'Amount (CAD)' : 'Amount (USD)'));

  const startVal = (state.answers[b.capture] != null ? state.answers[b.capture] : conf.defaultValue);
  let v = startVal;

  const big = el('div', { class:'curr-big' });
  const input = el('input', { type:'text', inputmode:'numeric', value: fmtMoney(v, conf.currency) });
  big.append(input);
  big.append(el('span', { class:'curr-edit-pill' }, 'Tap to edit'));
  card.append(big);

  const slider = el('input', { type:'range', class:'curr-slider',
    min: conf.min, max: conf.max, step: conf.step, value: v });
  card.append(slider);

  const ticks = el('div', { class:'curr-ticks' });
  const labels = [conf.min, Math.round((conf.min+conf.max)/4), Math.round((conf.min+conf.max)/2), Math.round((conf.min+conf.max)*3/4), conf.max];
  labels.forEach(t => ticks.append(el('span', null, fmtMoneyShort(t, conf.currency))));
  card.append(ticks);

  if (conf.helper) card.append(el('div', { class:'curr-helper' }, conf.helper));

  // Finance summary chip (CA finances)
  let summary = null;
  if (beatId === 'ca_deposit' || beatId === 'ca_price') {
    summary = el('div', { class:'curr-summary' });
    card.append(summary);
  }
  function updateSummary(){
    if (!summary) return;
    const price = (beatId === 'ca_price' ? v : state.answers.ca_price);
    const dep   = (beatId === 'ca_deposit' ? v : state.answers.ca_deposit);
    if (price && dep != null) {
      const pct = Math.round((dep/price)*100);
      summary.innerHTML = `<i class="ph-duotone ph-coins ph-xs"></i> ${pct}% deposit on ${fmtMoney(price,'CAD')}`;
    }
  }
  function updatePct(){
    const pct = ((v - conf.min) / (conf.max - conf.min)) * 100;
    slider.style.setProperty('--pct', pct + '%');
  }
  updatePct(); updateSummary();

  let userTouched = false;
  slider.addEventListener('input', () => {
    v = parseInt(slider.value, 10);
    input.value = fmtMoney(v, conf.currency);
    updatePct(); updateSummary();
    userTouched = true;
  });
  input.addEventListener('input', () => {
    const n = parseCurrencyToken(input.value);
    if (n != null) { v = Math.max(conf.min, Math.min(conf.max, n)); slider.value = v; updatePct(); updateSummary(); userTouched = true; }
  });
  input.addEventListener('blur', () => { input.value = fmtMoney(v, conf.currency); });

  const actions = el('div', { class:'rich-actions' });
  const cont = el('button', { class:'btn btn-soft', type:'button', onclick: () => {
    recordAnswer(b.capture, v, !userTouched);
    // Clear provisional flag — user has now confirmed
    if (state.provisional[b.capture]) delete state.provisional[b.capture];
    pushTurn('user', fmtMoney(v, conf.currency));
    advanceFrom(beatId, false);
  } }, [ 'Continue' ]);
  cont.append(el('i', { class:'ph-duotone ph-arrow-right ph-xs', style:'color:#fff;--ph-secondary-opacity:.5' }));
  actions.append(cont);
  card.append(actions);

  // Persistent chips row underneath
  host.append(card);
  host.append(buildChipRow(beatId, { chips:[], suppressPersistent:false }));
  return host;
}

/* =============================================================
   Widget update
   ============================================================= */
function updateWidget(){
  const list = document.getElementById('phaseList');
  list.innerHTML = '';
  const currentPhase = phaseOf(state.currentBeatId);
  const phaseDoneState = computePhaseStates(currentPhase);
  PHASES.forEach((p) => {
    const row = el('div', { class:'phase-row ' + (phaseDoneState[p.id] === 'done' ? 'done' : phaseDoneState[p.id] === 'active' ? 'active' : '') });
    row.append(el('span', { class:'dot' }));
    row.append(el('span', null, p.label));
    const summary = phaseSummary(p.id);
    if (summary) row.append(el('span', { class:'vals' }, summary));
    list.append(row);
  });

  const pct = progressPercent();
  document.getElementById('stepPct').textContent = pct + '%';
  document.getElementById('stepFill').style.width = pct + '%';
}

/* Phase-weighted progress: each of the four phases is worth 25% of the bar,
   regardless of how many beats it contains in the current route. Within a
   phase, progress interpolates by position. This makes the percentage
   monotonic — it never jumps backward when a route branch unlocks (the old
   `(idx+1) / route.length` formula collapsed from 100% to ~20% on every
   objective + us_soft answer). Terminal beats clamp to 100%. */
function progressPercent(){
  const cur = BEATS[state.currentBeatId];
  if (!cur) return 0;
  if (cur.terminal) return 100;
  const r = route();
  const idx = Math.max(0, r.indexOf(state.currentBeatId));
  const W = 100 / PHASES.length; // 25 each
  let pct = 0;
  for (const p of PHASES) {
    if (p.id !== cur.phase) { pct += W; continue; }
    const inPhase = r.filter(id => BEATS[id] && BEATS[id].phase === p.id);
    const posIn = Math.max(0, inPhase.indexOf(r[idx]));
    const frac = inPhase.length ? posIn / inPhase.length : 0;
    pct += W * frac;
    break;
  }
  return Math.round(pct);
}
function computePhaseStates(currentPhase){
  const o = {};
  let done = true;
  for (const p of PHASES) {
    if (p.id === currentPhase) { o[p.id] = 'active'; done = false; }
    else if (done) o[p.id] = 'done';
    else o[p.id] = 'pending';
  }
  return o;
}
function phaseSummary(pid){
  const a = state.answers;
  if (pid === 'goal') {
    const bits = [];
    if (a.country) bits.push(a.country === 'ca' ? 'CA' : 'US');
    if (a.objective) bits.push({buy:'Buy',own:'Refi',commercial:'Comm',flip:'Flip'}[a.objective]);
    return bits.join(' · ');
  }
  if (pid === 'property') {
    // Short forms so the 140px max-width column doesn't truncate mid-word.
    const shortType = { sf:'Single', condo:'Condo', '24unit':'2–4 unit', reno:'Construction' };
    const shortUse  = { primary:'Primary', vacation:'Vacation', invest:'Investment' };
    const bits = [];
    if (a.propType) bits.push(shortType[a.propType] || readableLabel('propType', a.propType));
    if (a.propUse)  bits.push(shortUse[a.propUse]   || readableLabel('propUse', a.propUse));
    return bits.join(' · ');
  }
  if (pid === 'finances') {
    if (a.ca_price) return fmtMoneyShort(a.ca_price,'CAD');
    if (a.us_value) return fmtMoneyShort(a.us_value,'USD');
    return '';
  }
  if (pid === 'you') {
    if (a.form_first) return a.form_first + ' ' + (a.form_last||'');
    return '';
  }
  return '';
}

function primeComposerForBeat(beatId){
  const b = BEATS[beatId];
  if (!b) return;
  // Default: composer is enabled
  txtEl.disabled = false;
  sendBtn.disabled = !txtEl.value.trim();
  if (b.terminal) {
    txtEl.placeholder = 'Conversation closed. Tap an option above.';
    txtEl.disabled = true;
    sendBtn.disabled = true;
    return;
  }
  if (b.rich) { txtEl.placeholder = 'Use the panel above, or type the value here…'; return; }
  if (b.kind === 'name')    { txtEl.placeholder = 'Type your full name…'; return; }
  if (b.kind === 'contact') { txtEl.placeholder = 'Type email and phone…';    return; }
  txtEl.placeholder = 'Type a reply, or tap an option above…';
}

function handleSubmit(){
  const raw = txtEl.value.trim();
  if (!raw) return;
  txtEl.value = ''; sendBtn.disabled = true;

  const beatId = state.currentBeatId;
  const b = BEATS[beatId];
  if (!b || b.terminal) return;

  // Try extraction
  const extracted = extractEntities(raw, beatId);

  // Multi-fact intake?
  const factKeys = Object.keys(extracted);
  const isCurrentBeatFilled = (b.capture && extracted[b.capture] != null)
    || (beatId === 'us_income' && (extracted.us_income != null || extracted.us_value != null || extracted.us_rental != null));

  if (factKeys.length >= 2) {
    // record everything
    factKeys.forEach(k => recordAnswer(k, extracted[k], false));
    updateWidget(); // P1 §6.6 — reflect captured values before next agent turn
    // Push user message as 'extracted' style
    pushTurn('user', raw);
    // Build fact chips for echo
    const facts = factKeys.map(k => factForKey(k));
    showTyping(() => {
      const echo = facts.length >= 3
        ? `Got it — ${facts.map(f => f.echoFragment).join(', ')}. Want to fix any of those?`
        : `Got it — ${facts.map(f => f.echoFragment).join(', ')}.`;
      const fixChips = factKeys.map(k => ({ label:`Fix ${labelForKey(k)}`, value:'__fix_'+keyToBeat(k) }));
      pushTurn('agent', esc(echo), {
        beatId,
        ephemeralChips: true,
        factChips: facts,
        chipRow: buildChipRow(beatId, { chips:[
          { label:'Looks right — keep going', value:'__lookright' },
          ...fixChips,
        ], suppressPersistent:false })
      });
    });
    return;
  }

  // Single fact
  if (factKeys.length === 1) {
    const onlyK = factKeys[0];
    if (b.capture && onlyK === b.capture) {
      recordAnswer(onlyK, extracted[onlyK], false);
      updateWidget(); // P1 §6.6
      pushTurn('user', raw);
      advanceFrom(beatId, false);
      state.fallbackCount[beatId] = 0;
      return;
    }
    // Captured a future field — silent fast-path
    recordAnswer(onlyK, extracted[onlyK], false);
    updateWidget(); // P1 §6.6
    pushTurn('user', raw);
    // advance only if current beat actually got an answer; otherwise re-ask current
    if (b.capture && state.answers[b.capture] != null) {
      advanceFrom(beatId, false);
    } else {
      showTyping(() => renderCurrent());
    }
    return;
  }

  // Gibberish / unparseable
  pushTurn('user', raw);
  state.fallbackCount[beatId] = (state.fallbackCount[beatId] || 0) + 1;
  showTyping(() => {
    if (state.fallbackCount[beatId] >= 2) {
      pushTurn('agent', "Want me to hand this to a specialist?", { beatId, ephemeralChips:true, chipRow: buildChipRow(beatId, { chips:[
        { label:'Yes — talk to a specialist', value:'__spec' },
        { label:'No — let me try again', value:'__keepgoing' },
      ], suppressPersistent:true }) });
    } else {
      // Offer the rephrase + chip set again
      const rephrase = b.rephrase || b.ask;
      pushTurn('agent', `${esc(rephrase)}<span class="why">I didn't catch that. Pick one of the options, or type the answer in plain English.</span>`, {
        beatId, ephemeralChips: false,
        chipRow: typeof b.chipsBy === 'function' ? buildChipRow(beatId, { chips: b.chipsBy(state) }) : (b.chips ? buildChipRow(beatId) : buildChipRow(beatId, { chips:[] })),
        richHost: b.rich ? buildRichInput(beatId) : null,
      });
    }
  });
}

function factForKey(k){
  const a = state.answers;
  const v = a[k];
  const labels = {
    country:'Country', objective:'Objective', credit:'Credit', ca_credit:'Credit', us_credit:'Credit',
    propType:'Type', propUse:'Use', residency:'Residency',
    us_income:'Income', us_value:'Value', us_rental:'Rental',
    ca_price:'Price', ca_deposit:'Deposit',
  };
  let display = v;
  if (typeof v === 'number') display = fmtMoney(v, a.country === 'ca' ? 'CAD':'USD');
  else display = readableLabel(k, v) || v;
  let echoFragment = display;
  if (k === 'us_income')  echoFragment = `${fmtMoney(v,'USD')} income`;
  if (k === 'us_value')   echoFragment = `${fmtMoney(v,'USD')} property value`;
  if (k === 'us_rental')  echoFragment = v === 0 ? 'no rental income' : `${fmtMoney(v,'USD')} rental income`;
  if (k === 'ca_price')   echoFragment = `${fmtMoney(v,'CAD')} purchase`;
  if (k === 'ca_deposit') echoFragment = `${fmtMoney(v,'CAD')} down`;
  if (k === 'country')    echoFragment = v === 'us' ? 'in the United States' : 'in Canada';
  if (k === 'objective')  echoFragment = ({ buy:'buying', own:'refinancing', commercial:'commercial', flip:'fix and flip' })[v] || v;
  if (k === 'propType' || k === 'propUse' || k === 'residency') echoFragment = (readableLabel(k,v)||v).toLowerCase();
  return { k: labels[k] || k, v: display, echoFragment };
}
function labelForKey(k){
  const m = { country:'country', objective:'goal', propType:'property type', propUse:'use', residency:'residency',
    us_income:'income', us_value:'property value', us_rental:'rental',
    ca_price:'price', ca_deposit:'deposit', credit:'credit', ca_credit:'credit', us_credit:'credit' };
  return m[k] || k;
}
function keyToBeat(k){
  const m = { country:'country', objective:'objective',
    credit:'credit', ca_credit:'credit', us_credit:'credit',
    propType:'propType', propUse:'propUse', residency:'residency',
    us_income:'us_income', us_value:'us_value', us_rental:'us_rental',
    ca_price:'ca_price', ca_deposit:'ca_deposit' };
  return m[k] || 'country';
}

   ============================================================= */
function boot(){
  // Resume case?
  if (state.history && state.history.length > 0 && Object.keys(state.answers).length > 0) {
    // Render captured history + sync widget to actual progress (otherwise the
    // returning user sees the stale initial-markup values until they click).
    renderStack();
    updateWidget();
    // Then prepend a resume recap
    showTyping(() => renderResumeRecap());
  } else {
    state.history = [];
    state.currentBeatId = state.currentBeatId || 'country';
    renderCurrent();
  }
}

function renderResumeRecap(){
  // Build chip-row recap of captured answers
  const a = state.answers;
  const chips = [];
  if (a.country)   chips.push({ label: a.country === 'ca' ? 'Canada' : 'United States',          value:'__fix_country' });
  if (a.objective) chips.push({ label: ({buy:'Buy a home',own:'Refinance',commercial:'Commercial',flip:'Fix & flip'})[a.objective], value:'__fix_objective' });
  if (a.ca_credit || a.us_credit) {
    const v = a.ca_credit || a.us_credit;
    chips.push({ label: ({none:'No credit',poor:'Poor',fair:'Fair',good:'Good',vgood:'Very good',exc:'Excellent'})[v]+' credit', value:'__fix_credit' });
  }
  if (a.propType)  chips.push({ label: readableLabel('propType', a.propType), value:'__fix_propType' });
  if (a.ca_price)  chips.push({ label: fmtMoney(a.ca_price,'CAD'),            value:'__fix_ca_price' });
  if (a.us_value)  chips.push({ label: fmtMoney(a.us_value,'USD'),            value:'__fix_us_value' });
  chips.push({ label: 'Keep going →', value:'__keepgoing' });
  pushTurn('agent',
    "Welcome back. Quick recap of what you told us. Tap anything to edit, otherwise we'll pick up where we stopped.",
    { ephemeralChips:true, chipRow: buildChipRow(state.currentBeatId, { chips, suppressPersistent:false }) }
  );
}

boot();

</script>
</body>
</html>
