/* ============================================================
   Review step — summary of every answer with Edit affordances
   ============================================================ */
function renderReview() {
  // Walk the route (minus review/success) and group items by phase.
  const seq = route().filter(id => id !== 'review' && id !== 'success');
  const groups = { goal:[], property:[], finances:[], you:[] };

  const fmt = (spec, val) => {
    if (val == null || val === '') return null;
    return formatAnswerValue(spec, val);
  };
  const pushItem = (phase, item) => {
    const ph = phase || 'you';
    if (!groups[ph]) groups[ph] = [];
    groups[ph].push(item);
  };

  for (const id of seq) {
    const step = STEPS[id];
    if (!step) continue;
    if (step.kind === 'combo') {
      (step.subs || []).forEach(sub => {
        const v = state.answers[sub.id];
        const value = fmt(sub, v);
        pushItem(sub.phase || step.phase, {
          jumpId: id,
          label: sub.panel || sub.head || sub.id,
          value: value || 'Not provided',
        });
      });
    } else if (['info','exit','form','flipform'].includes(step.kind)) {
      // form/flipform answers are appended separately below.
      continue;
    } else {
      const v = state.answers[id];
      pushItem(step.phase, {
        jumpId: id,
        label: step.panel || step.title,
        value: fmt(step, v) || 'Not provided',
      });
    }
  }

  // Form fields (CA / US final form).
  if (state.answers.form) {
    const f = state.answers.form;
    const formStepId = seq.find(id => STEPS[id] && STEPS[id].kind === 'form') || 'ca_form';
    const fullName = [f.first, f.middle, f.last].filter(Boolean).join(' ');
    const addressParts = [
      f.street && (f.apt ? `${f.street}, ${f.apt}` : f.street),
      f.city,
      f.state || f.province,
      f.zip || f.postal,
    ].filter(Boolean);
    pushItem('you', { jumpId: formStepId, label:'Name',    value: fullName || 'Not provided' });
    pushItem('you', { jumpId: formStepId, label:'Email',   value: f.email || 'Not provided' });
    pushItem('you', { jumpId: formStepId, label:'Phone',   value: f.phone || 'Not provided' });
    pushItem('you', { jumpId: formStepId, label:'Address', value: addressParts.join(', ') || 'Not provided' });
  } else if (state.answers.flip) {
    const f = state.answers.flip;
    pushItem('you', { jumpId:'flip_form', label:'Borrower(s)',            value: f.name  || 'Not provided' });
    pushItem('you', { jumpId:'flip_form', label:'Email',                  value: f.email || 'Not provided' });
    pushItem('you', { jumpId:'flip_form', label:'Phone',                  value: f.phone || 'Not provided' });
    pushItem('you', { jumpId:'flip_form', label:'Credit range',           value: f.credit || 'Not provided' });
    pushItem('you', { jumpId:'flip_form', label:'Years investing',        value: f.years || 'Not provided' });
    pushItem('you', { jumpId:'flip_form', label:'Transactions completed', value: f.transactions || 'Not provided' });
  }

  // Render groups in phase order. Skip empty groups.
  const sections = ['goal','property','finances','you']
    .filter(p => (groups[p] || []).length > 0)
    .map(p => {
      const head = phaseLabel(p) || 'Details';
      // Edit jumps to the first item in this section
      const firstJump = groups[p][0].jumpId;
      const rowsHtml = groups[p].map(row => `
        <div class="review-row">
          <dt>${escapeHtml(row.label)}</dt>
          <dd>${escapeHtml(row.value)}</dd>
        </div>
      `).join('');
      return `
        <section class="review-section">
          <header class="review-section-head">
            <h3>${escapeHtml(head)}</h3>
            <button type="button" class="review-edit" data-jump="${escapeHtml(firstJump)}">
              <i class="ph-duotone ph-pencil-simple ph-xs"></i> Edit
            </button>
          </header>
          <dl class="review-list">${rowsHtml}</dl>
        </section>
      `;
    }).join('');

  return `<div class="review">${sections}</div>`;
}

function wireReview() {
  document.querySelectorAll('[data-jump]').forEach(btn => {
    if (btn.closest('.review-section-head')) {
      btn.onclick = () => {
        const id = btn.dataset.jump;
        if (!id || !STEPS[id]) return;
        state.currentId = id;
        persist();
        renderAll();
      };
    }
  });
}

function wireForm() {
  const f = document.getElementById('finalForm');
  if (!f) return;
  const isCa = f.dataset.country === 'ca';
  const regionName = isCa ? 'province' : 'state';
  const postalName = isCa ? 'postal' : 'zip';
  const banner = f.querySelector('#formErrorBanner');

  const showFieldError = (name, msg) => {
    const errEl = f.querySelector(`.field-error[data-err="${name}"]`);
    const inp = f.querySelector(`[name="${name}"]`);
    if (inp) inp.classList.add('invalid');
    if (errEl) { if (msg) errEl.textContent = msg; errEl.classList.add('show'); }
  };
  const clearFieldError = (name) => {
    const errEl = f.querySelector(`.field-error[data-err="${name}"]`);
    const inp = f.querySelector(`[name="${name}"]`);
    if (inp) inp.classList.remove('invalid');
    if (errEl) errEl.classList.remove('show');
  };
  const clearAllErrors = () => {
    f.querySelectorAll('.field-error.show').forEach(e => e.classList.remove('show'));
    f.querySelectorAll('.invalid').forEach(e => e.classList.remove('invalid'));
    banner.classList.remove('show'); banner.textContent = '';
  };

  // Clear individual field errors as the user fixes them
  f.querySelectorAll('input,select').forEach(el => {
    el.addEventListener('input',  () => clearFieldError(el.name));
    el.addEventListener('change', () => clearFieldError(el.name));
  });

  f.addEventListener('submit', (e) => {
    e.preventDefault();
    clearAllErrors();

    const fd = new FormData(f);
    const data = {}; fd.forEach((v,k)=>{ data[k]=v; });

    const required = ['first','last','email','phone','street','city', regionName, postalName];
    let firstBad = null;

    for (const r of required) {
      if (!String(data[r]||'').trim()) {
        showFieldError(r, null);
        if (!firstBad) firstBad = r;
      }
    }
    if (data.email && !FORM_PATTERNS.email.test(data.email.trim())) {
      showFieldError('email', 'Please enter a valid email address.');
      if (!firstBad) firstBad = 'email';
    }
    if (data.phone) {
      const phonePattern = isCa ? FORM_PATTERNS.phone_ca : FORM_PATTERNS.phone_us;
      if (!phonePattern.test(data.phone.trim())) {
        showFieldError('phone', 'Please enter a 10 digit phone number.');
        if (!firstBad) firstBad = 'phone';
      }
    }
    if (data[postalName]) {
      const postalPattern = isCa ? FORM_PATTERNS.postal_ca : FORM_PATTERNS.zip_us;
      if (!postalPattern.test(data[postalName].trim())) {
        showFieldError(postalName, isCa ? 'Use the format A1A 1A1.' : 'Use a 5 digit ZIP (or ZIP+4).');
        if (!firstBad) firstBad = postalName;
      }
    }

    const consentMissing = !f.softCredit.checked || !f.esign.checked;
    if (firstBad || consentMissing) {
      const msg = consentMissing && !firstBad
        ? 'Please agree to the soft credit check and E-Sign disclosure to continue.'
        : 'Please fix the highlighted fields and submit again.';
      banner.textContent = msg;
      banner.classList.add('show');
      const focusTarget = firstBad ? f.querySelector(`[name="${firstBad}"]`) : null;
      if (focusTarget) focusTarget.focus();
      banner.scrollIntoView({ behavior:'smooth', block:'nearest' });
      return;
    }

    state.answers.form = data;
    state.currentId = 'review';
    persist(); renderAll();
  });
}
function wireFlipForm() {
  const f = document.getElementById('flipForm');
  if (!f) return;
  f.addEventListener('submit', (e) => {
    e.preventDefault();
    const fd = new FormData(f);
    const data = {}; fd.forEach((v,k)=>{ data[k]=v; });
    state.answers.flip = data;
    state.currentId = 'review';
    persist(); renderAll();
  });
}

/* navigation */
function goNext() {
  const seq = route();
  const i = seq.indexOf(state.currentId);
  const step = STEPS[state.currentId];

  // On form steps, the dock's Continue button submits the form — validation
  // and state transitions happen inside the form's submit handler.
  if (step.kind === 'form') {
    const f = document.getElementById('finalForm');
    if (f) (f.requestSubmit ? f.requestSubmit() : f.dispatchEvent(new Event('submit',{cancelable:true,bubbles:true})));
    return;
  }
  if (step.kind === 'flipform') {
    const f = document.getElementById('flipForm');
    if (f) (f.requestSubmit ? f.requestSubmit() : f.dispatchEvent(new Event('submit',{cancelable:true,bubbles:true})));
    return;
  }
  // Review step: this is the final confirmation — advance to success.
  if (step.kind === 'review') {
    state.currentId = 'success';
    persist(); renderAll();
    return;
  }

  if (step.kind === 'tiles' || step.kind === 'yesno') {
    if (state.answers[state.currentId] == null) return;
  }
  if (step.kind === 'combo' && !comboComplete(step)) return;
  const nextId = seq[i+1];
  if (!nextId) return;
  state.currentId = nextId;
  persist(); renderAll();
}
function goBack() {
  const seq = route();
  const i = seq.indexOf(state.currentId);
  if (i <= 0) return;
  state.currentId = seq[i-1];
  persist(); renderAll();
}
function saveProgress() {
  openDialog({
    title:'Save your spot',
    body:"Enter your email and we'll send a secure link back to this exact step. No account needed.",
    confirmLabel:'Email me the link', cancelLabel:'Not now',
    inputPlaceholder:'you@example.com', inputType:'email',
    validate:(val) => {
      if (!val) return 'Please enter your email address.';
      if (!FORM_PATTERNS.email.test(val)) return "That doesn't look like a valid email.";
      return null;
    },
    onConfirm:(email) => {
      openDialog({ title:'Saved. Check your inbox.', body:`We sent a secure link to <strong>${escapeHtml(email)}</strong>. It's good for 7 days.`, confirmLabel:'Got it' });
    }
  });
}

function openDialog({title, body, confirmLabel='OK', cancelLabel, onConfirm, onCancel, inputPlaceholder, inputType='text', validate}) {
  const overlay = document.getElementById('dialogOverlay');
  document.getElementById('dialogTitle').textContent = title;
  const bodyEl = document.getElementById('dialogBody');
  const inputHtml = inputPlaceholder
    ? `<input class="input" id="dialogInput" type="${inputType}" placeholder="${inputPlaceholder}" style="margin-top:12px" autocomplete="email">
       <div class="dialog-input-error" id="dialogInputError"></div>`
    : '';
  bodyEl.innerHTML = body + inputHtml;
  const confirmBtn = document.getElementById('dialogConfirm');
  const cancelBtn = document.getElementById('dialogCancel');
  confirmBtn.textContent = confirmLabel;
  cancelBtn.style.display = cancelLabel ? 'inline-flex' : 'none';
  if (cancelLabel) cancelBtn.textContent = cancelLabel;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  const close = () => { overlay.classList.remove('open'); document.body.style.overflow = ''; };

  const inp = document.getElementById('dialogInput');
  const errEl = document.getElementById('dialogInputError');
  const setErr = (msg) => {
    if (!errEl) return;
    if (msg) { errEl.textContent = msg; errEl.classList.add('show'); inp && inp.classList.add('invalid'); }
    else     { errEl.textContent = '';  errEl.classList.remove('show'); inp && inp.classList.remove('invalid'); }
  };
  if (inp) inp.addEventListener('input', () => setErr(null));

  confirmBtn.onclick = () => {
    const val = inp ? inp.value.trim() : undefined;
    if (validate) {
      const msg = validate(val);
      if (msg) { setErr(msg); inp && inp.focus(); return; }
    }
    close(); if (onConfirm) onConfirm(val);
  };
  cancelBtn.onclick = () => { close(); if (onCancel) onCancel(); };
  overlay.onclick = (e) => { if (e.target === overlay) close(); };
  (inp || confirmBtn).focus();
}

function renderAll() {
  renderProgress();
  renderStep();
  // no scroll jumps — wizard is fixed-position in viewport
}

document.getElementById('backBtn').onclick = goBack;
document.getElementById('continueBtn').onclick = goNext;
document.getElementById('saveLink').onclick = (e) => { e.preventDefault(); saveProgress(); };

/* Scroll-edge indicators — toggle .has-scroll-top / .has-scroll-bottom on
   the body wrap based on the body's scroll position. */
(function wireScrollFade(){
  const wrap = document.getElementById('stepBodyWrap');
  const body = document.getElementById('stepBody');
  const update = () => {
    const max = body.scrollHeight - body.clientHeight;
    if (max <= 1) {
      wrap.classList.remove('has-scroll-top','has-scroll-bottom');
      return;
    }
    wrap.classList.toggle('has-scroll-top', body.scrollTop > 4);
    wrap.classList.toggle('has-scroll-bottom', body.scrollTop < max - 4);
  };
  body.addEventListener('scroll', update, { passive:true });
  window.addEventListener('resize', update);
  // Re-check after each render (body content changes between steps).
  const obs = new MutationObserver(() => requestAnimationFrame(update));
  obs.observe(body, { childList:true, subtree:true });
  update();
  window.__updateScrollFade = update;
})();

// Progress panel is now always visible (vertical on desktop, horizontal
// compact strip on mobile). The previous toggle has been removed.
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const overlay = document.getElementById('dialogOverlay');
    if (overlay.classList.contains('open')) { overlay.classList.remove('open'); document.body.style.overflow=''; return; }
    const w = document.getElementById('whyWrap');
    if (w && w.classList.contains('open')) {
      w.classList.remove('open'); document.getElementById('whyAsk').setAttribute('aria-expanded','false');
    }
  }
  if (e.key === 'Enter') {
    const step = STEPS[state.currentId];
    if (!step) return;
    if (e.target.tagName === 'INPUT' && (step.kind === 'currency' || step.kind === 'combo')) {
      e.preventDefault(); goNext();
    }
  }
});
document.addEventListener('click', (e) => {
  const w = document.getElementById('whyWrap');
  if (w && w.classList.contains('open') && !w.contains(e.target)) {
    w.classList.remove('open');
    document.getElementById('whyAsk').setAttribute('aria-expanded','false');
  }
});

renderAll();
